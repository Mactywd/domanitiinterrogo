<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Materia</title>

		<style>
			body {
				margin: 0;
				padding: 0;
				background-color: #f1f1f1;
			}

			nav {
				background-color: #fff;
				height: 60px;
				display: flex;
				justify-content: flex-start;
				align-items: center;
			}
			nav a {
				text-decoration: none;
				color: #4ea5d1;
				font-weight: bold;
				font-size: 20px;
				margin-left: 20px;
			}

			img {
				height: 40px;
				margin-left: 20px;
			}

			table {
				border-collapse: collapse;
				margin-top: 1em;
				width: 100%;
				font-size: 0.9em;
			}
			thead tr {
				border-bottom: 1px solid #ccc;
				background-color: #4ea5d1;
				color: #ffffff;
				text-align: left;
				font-weight: bold;
			}
			th,
			td {
				padding: 10px 15px;
			}
			tbody tr {
				border-bottom: 1px solid #ccc;
			}
			tbody tr:nth-of-type(even) {
				background-color: #dfdfdf;
			}

			tbody button {
				background-color: #4ea5d1;
				color: #ffffff;
				border: none;
				border-radius: 5px;
				padding: 5px 10px;
				font-size: 0.9em;
				cursor: pointer;
			}
			.update {
				display: none;
				color: black;
				padding: 0em 5% 1em 5%;
				position: fixed;
				width: 80%;
				margin-left: 5%;
				margin-top: 20px;
				background-color: #f1f1f1;
				border: 1px solid black;
				border-radius: 10px;
			}
			.input-data {
				display: grid;
				grid-template-columns: 1.5fr 1fr;
				align-items: center;
			}
			.input-data p {
				margin: 0;
			}
			.input-data input {
				width: 90%;
				padding: 5px;
				margin: 5px;
				border: none;
				border-radius: 5px;
			}
			.buttons {
				display: flex;
				justify-content: space-around;
				align-items: center;
				margin-top: 10px;
			}
			.buttons button {
				background-color: #4ea5d1;
				color: #ffffff;
				border: none;
				border-radius: 5px;
				padding: 5px 10px;
				font-size: 0.9em;
				cursor: pointer;
			}
		</style>
	</head>
	<body>
		<nav>
			<img src="https://i.imgur.com/GOYwxYO.png" alt="logo" />
			<!-- <a href="."><img src="https://i.imgur.com/lJKFrz5.png" alt="Interrogazioni"></a> -->
			<a href="/">Interrogazioni</a>
		</nav>

		<main>
			<div class="update">
				<h2>Aggiorna Interrogazioni</h2>
				<!-- input for nome and ultima interrogazione without forms -->
				<div class="input-data">
					<p>Nome:</p>
					<input type="text" class="person-name" value="" readonly />
					<p>Ultima Interrogazione:</p>
					<input type="date" class="new-date" />
				</div>
				<div class="buttons">
					<button id="back-btn">Indietro</button>
					<button id="update-btn">Aggiorna</button>
				</div>
			</div>

			<table>
				<thead>
					<th>Nome</th>
					<th>Interrogazione</th>
					<th>Volte</th>
					<th></th>
				</thead>
				<tbody>
					{% for person in people %}
					<tr id="{{person}}">
						<td class="name-td"></td>
						<td class="date-td"></td>
						<td class="times-td"></td>
						<td><button class="update-button">Aggiorna</button></td>
					</tr>
					{% endfor %}
				</tbody>
			</table>
		</main>

		<!-- import jquery -->
		<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

		<script>
			$(document).ready(function() {

				people = {{ people|safe }}
				interrogations = {{ interrogations|safe }}
				console.log(interrogations)
				interrogated_times = {{ interrogated_times|safe }}
				colors = []


				for (let i = 0; i < interrogations.length; i++) {
					console.log(interrogations[i])

					if ($.isEmptyObject(interrogations[i])) {
						interrogations[i] = "mai";
						colors.push("red");
					} else {
						interrogations[i] = Object.values(interrogations[i])[Object.values(interrogations[i]).length - 1];
						colors.push("green");

						var dateString = "2023/11/02";


						// Convert the date string to a Date object
						var dateObject = new Date(interrogations[i]);

						// Get the day, month, and year components
						var day = dateObject.getDate();
						var month = dateObject.getMonth(); // Note: Months are zero-indexed
						var year = dateObject.getFullYear();

						// Array of month names
						var monthNames = [
						"Gennaio", "Febbraio", "Marzo", "Aprile",
						"Maggio", "Giugno", "Luglio", "Agosto",
						"Settembre", "Ottobre", "Novembre", "Dicembre"
						];

						// Format the date
						var formattedDate = day + ' ' + monthNames[month];
						interrogations[i] = formattedDate;

					}
				}


				for (let i = 0; i < people.length; i++) {
					$(`#${people[i]}`).children(".name-td").text(people[i]);
					$(`#${people[i]}`).children(".date-td").text(interrogations[i]);
					$(`#${people[i]}`).children(".date-td").css("color", colors[i]);
					$(`#${people[i]}`).children(".times-td").text(interrogated_times[i]);
				}
			});


			$(".update-button").on("click", function() {
					$(".person-name").val($(this)[0].parentNode.parentNode.children[0].innerText)
					$(".update").show();

					// $(this)[0].parentNode.parentNode.children[0].innerText
			             });

			$("#back-btn").on("click", () => {
				$(".update").hide();
			});

			$("#update-btn").on("click", () => {
				// ajax request
				$.ajax({
					url: "/update/",
					type: "POST",
					headers: {
						'X-CSRFToken': "{{ csrf_token }}",
					},
					data: {
						name: $(".person-name").val(),
						date: $(".new-date").val(),
						subject: "{{subject}}",
					},
					success: function(response) {
						location.reload();
					},
				});


				$(".update").hide();
			});
		</script>
	</body>
</html>

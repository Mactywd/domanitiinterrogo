<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Materia</title>

		<style>
			body {
				margin: 0;
				padding: 0;
				background-color: #f1f1f1;
			}

			nav {
				background-color: #fff;
				height: 60px;
				display: flex;
				justify-content: flex-start;
				align-items: center;
			}
			nav a {
				text-decoration: none;
				color: #4ea5d1;
				font-weight: bold;
				font-size: 20px;
				margin-left: 20px;
			}

			img {
				height: 40px;
				margin-left: 20px;
			}

			table {
				border-collapse: collapse;
				margin-top: 1em;
				width: 100%;
				font-size: 0.9em;
			}
			thead tr {
				border-bottom: 1px solid #ccc;
				background-color: #4ea5d1;
				color: #ffffff;
				text-align: left;
				font-weight: bold;
			}
			th,
			td {
				padding: 10px 15px;
			}
			tbody tr {
				border-bottom: 1px solid #ccc;
			}
			tbody tr:nth-of-type(even) {
				background-color: #dfdfdf;
			}

			tbody button {
				background-color: #4ea5d1;
				color: #ffffff;
				border: none;
				border-radius: 5px;
				padding: 5px 10px;
				font-size: 0.9em;
				cursor: pointer;
			}
			.update {
				display: none;
				color: black;
				padding: 0em 5% 1em 5%;
				position: fixed;
				width: 80%;
				margin-left: 5%;
				margin-top: 20px;
				background-color: #f1f1f1;
				border: 1px solid black;
				border-radius: 10px;
			}
			.input-data {
				display: grid;
				grid-template-columns: 1.5fr 1fr;
				align-items: center;
			}
			.input-data p {
				margin: 0;
			}
			.input-data input {
				width: 90%;
				padding: 5px;
				margin: 5px;
				border: none;
				border-radius: 5px;
			}
			.buttons {
				display: flex;
				justify-content: space-around;
				align-items: center;
				margin-top: 10px;
			}
			#update-btn, #back-btn {
				background-color: #4ea5d1;
				color: #ffffff;
				border: none;
				border-radius: 5px;
				padding: 5px 10px;
				font-size: 0.9em;
				cursor: pointer;
			}
			.interrogation-data {
				display: flex;
				justify-content: space-between;
				align-items: center;
			}
			.interrogation-data button {
				background-color: #ff0000;
				color: #ffffff;
				border: none;
				border-radius: 5px;
				padding: 5px 10px;
				font-size: 0.9em;
				cursor: pointer;
			}
			.interrogation-date {
				font-weight: normal;
			}
		</style>
	</head>
	<body>
		<nav>
			<img src="https://i.imgur.com/GOYwxYO.png" alt="logo" />
			<!-- <a href="."><img src="https://i.imgur.com/lJKFrz5.png" alt="Interrogazioni"></a> -->
			<a href="/">Interrogazioni</a>
		</nav>

		<main>
			<div class="update">
				<h2>Aggiorna Interrogazioni</h2>
				<!-- input for nome and ultima interrogazione without forms -->
				<hr>
				<h4>Aggiungi Interrogazione<h4>
				<div class="input-data">
					<p>Nome:</p>
					<input type="text" class="person-name" value="" readonly />
					<p>Ultima Interrogazione:</p>
					<input type="date" class="new-date" />
				</div>
				<div class="buttons">
					<button id="update-btn">Aggiorna</button>
				</div>
				<hr>
				<h4>Rimuovi Interrogazione<h4>
					<div class="del-data">
					</div>
					
					{% comment %} <div class="del-data">
						<p>12/4/2023</p>
						<button>Elimina</button>
					</div>
					<div class="del-data">
						<p>17/5/2023</p>
						<button>Elimina</button>
					</div>
					<div class="del-data">
						<p>19/8/2023</p>
						<button>Elimina</button>
					</div> {% endcomment %}
				<hr>
				<button id="back-btn">Indietro</button>
			</div>

			<table>
				<thead>
					<th>Nome</th>
					<th>Data</th>
					<th>Volte</th>
					<th></th>
				</thead>
				<tbody>
					{% for person in people %}
					<tr id="{{person}}">
						<td class="name-td"></td>
						<td class="date-td"></td>
						<td class="times-td"></td>
						<td><button class="update-button">Aggiorna</button></td>
					</tr>
					{% endfor %}
				</tbody>
			</table>
		</main>

		<!-- import jquery -->
		<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

		<script>
			function dateFormatter(date) {
				// Convert the date string to a Date object
				var dateObject = new Date(date);

				// Get the day, month, and year components
				var day = dateObject.getDate();
				var month = dateObject.getMonth(); // Note: Months are zero-indexed
				var year = dateObject.getFullYear();

				// Array of month names
				var monthNames = [
				"Gennaio", "Febbraio", "Marzo", "Aprile",
				"Maggio", "Giugno", "Luglio", "Agosto",
				"Settembre", "Ottobre", "Novembre", "Dicembre"
				];

				// Format the date
				var formattedDate = day + ' ' + monthNames[month];
				return formattedDate;
			}

			$(document).ready(function() {

				people = {{ people|safe }}
				interrogations = {{ interrogations|safe }}
				console.log(interrogations)
				interrogated_times = {{ interrogated_times|safe }}
				colors = []


				for (let i = 0; i < interrogations.length; i++) {
					console.log(interrogations[i])

					if ($.isEmptyObject(interrogations[i])) {
						interrogations[i] = "mai";
						colors.push("red");
					} else {
						interrogations[i] = Object.values(interrogations[i])[Object.values(interrogations[i]).length - 1];
						colors.push("green");

						formattedDate = dateFormatter(interrogations[i]);
						interrogations[i] = formattedDate;

					}
				}


				for (let i = 0; i < people.length; i++) {
					$(`#${people[i]}`).children(".name-td").text(people[i]);
					$(`#${people[i]}`).children(".date-td").text(interrogations[i]);
					$(`#${people[i]}`).children(".date-td").css("color", colors[i]);
					$(`#${people[i]}`).children(".times-td").text(interrogated_times[i]);
				}
			});


			$(".update-button").on("click", function() {
					$(".person-name").val($(this)[0].parentNode.parentNode.children[0].innerText)

					// get dates of past interrogations
					interrogations = {{ interrogations|safe }}
					person = $(this)[0].parentNode.parentNode.children[0].innerText
					console.log(person)
					console.log(interrogations)
					
					// get person index
					person_index = people.indexOf(person)
					console.log(interrogations[person_index])

					interrogation_dates = Object.values(interrogations[person_index])

					$('.del-data').empty()
					for (let i = 0; i < interrogation_dates.length; i++) {
						// add dates to .del-data
						$('.del-data').append(`<div class="interrogation-data"> <p class="interrogation-date">${dateFormatter(interrogation_dates[i])}</p> <button class="del-button">Elimina</button> </div>`)
					}
					$(".update").show();

					// $(this)[0].parentNode.parentNode.children[0].innerText
			});

			$("#back-btn").on("click", () => {
				$(".update").hide();
			});

			$("#update-btn").on("click", () => {
				if ($(".new-date").val() == "") {
					return;
				}
				// ajax request
				$.ajax({
					url: "/update/",
					type: "POST",
					headers: {
						'X-CSRFToken': "{{ csrf_token }}",
					},
					data: {
						name: $(".person-name").val(),
						date: $(".new-date").val(),
						subject: "{{subject}}",
					},
					success: function(response) {
						location.reload();
					},
				});


				$(".update").hide();
			});

			$('.del-data').on('click', '.del-button', function() {
				$.ajax({
					url: "/delete/",
					type: "POST",
					headers: {
						'X-CSRFToken': "{{ csrf_token }}",
					},
					data: {
						name: $(".person-name").val(),
						date: $(this).siblings('.interrogation-date').text(),
						subject: "{{subject}}",
					},
					success: function(response) {
						location.reload();
					},
				});
			})
		</script>
	</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domani ti interrogo</title>
    <style>
        /* NAVBAR */
        body {
            margin: 0;
            padding: 0;
            background-color: #f1f1f1;
        }

        nav {
            background-color: #fff;
            height: 60px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }
        nav a {
            text-decoration: none;
            color: #4ea5d1;
            font-weight: bold;
            font-size: 20px;
            margin-left: 20px;
        }

        img {
            height: 40px;
            margin-left: 20px;
        }

        /* BOTTONI */
        .buttons {
            display: flex;
            flex-direction: column;
            width: 80%;
            align-content: center;
            margin: 0 auto;
            justify-content: space-around;
        }
        .buttons a {
            background-color: #4ea5d1;
            color: white;
            border: none;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            cursor: pointer;
            border-radius: 10px;
            margin-top: 2em;
        }
        .buttons :any-link:active {
            background-color: #35708d;
        }
    </style>
</head>
<body>
    <nav>
        <img src="https://i.imgur.com/GOYwxYO.png" alt="logo" />
        <!-- <a href="."><img src="https://i.imgur.com/lJKFrz5.png" alt="Interrogazioni"></a> -->
        <a href="/">Interrogazioni</a>
    </nav>

    <div class="buttons">
        <a href="/interrogazioni/" id="interrogazioni">Interrogazioni</button>
        <a href="/estrazione/" id="estrazioni">Estrazioni</button>
    </div>
</body>
</html>
